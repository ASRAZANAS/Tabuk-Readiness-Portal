س<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل الطالب بالصور</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f8f8f8;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .section-image {
            width: 80%;          /* نسبة عرض الصورة */
            max-width: 800px;    /* الحد الأقصى للعرض */
            margin: 20px 0;      /* مسافة بين الصور */
            cursor: pointer;
            transition: transform 0.3s;
        }

        .section-image:hover {
            transform: scale(1.03); /* تكبير بسيط عند المرور */
        }
    </style>
</head>
<body>

<!-- زر الرجوع للصفحة الرئيسية -->
<a href="index.html" style="
    position: fixed;
    top: 20px;
    left: 20px;
    background-color: #007bff;
    color: white;
    padding: 10px 15px;
    border-radius: 5px;
    text-decoration: none;
    font-weight: bold;
    z-index: 1000;
">الرئيسية</a>




    <!-- 11 صورة بصيغة JPEG -->
    <img src="image1.jpeg" class="section-image" alt="صورة 1">
    <img src="image2.jpeg" class="section-image" alt="صورة 2">
    <img src="image3.jpeg" class="section-image" alt="صورة 3">
    <img src="image4.jpeg" class="section-image" alt="صورة 4">
    <img src="image5.jpeg" class="section-image" alt="صورة 5">
    <img src="image6.jpeg" class="section-image" alt="صورة 6">
    <img src="image7.jpeg" class="section-image" alt="صورة 7">
    <img src="image8.jpeg" class="section-image" alt="صورة 8">
    <img src="image9.jpeg" class="section-image" alt="صورة 9">
    <img src="image10.jpeg" class="section-image" alt="صورة 10">
    <img src="image11.jpeg" class="section-image" alt="صورة 11">

</body>
</html>
